name: Workspace Tab Access Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_workspace_tab_access.py'
      - '.github/workflows/workspace-tab-access-gate.yml'

permissions:
  contents: read

jobs:
  workspace-tab-access:
    name: Workspace Tab Access
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: pytest -q tests/test_workspace_tab_access.py
