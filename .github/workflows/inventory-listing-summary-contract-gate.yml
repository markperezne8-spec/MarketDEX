name: Inventory Listing Summary Contract Gate
on: [pull_request, workflow_dispatch]
jobs:
  listing-summary-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest -r requirements.txt
      - run: pytest -q tests/test_inventory_listing_workspace_feature.py tests/test_listing_workspace_summary_contract.py
