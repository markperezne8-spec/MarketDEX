name: Operator Shell Mission Control Scope Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_mission_control_scope.py'
      - '.github/workflows/operator-shell-mission-control-scope-gate.yml'

jobs:
  mission-control-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify Mission Control scope
        run: python -m pytest -q tests/test_operator_shell_mission_control_scope.py
