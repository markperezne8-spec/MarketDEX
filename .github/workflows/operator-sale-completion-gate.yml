name: Operator Sale Completion Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - 'services/operator_sale_completion_service.py'
      - 'ui/inventory_sale_completion_feature.py'
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_sale_completion.py'
      - 'docs/SALE_COMPLETION.md'
      - 'docs/BUILD_PROGRESS.md'
      - '.github/workflows/operator-sale-completion-gate.yml'

jobs:
  operator-sale-completion:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_operator_sale_completion.py tests/test_operator_recorded_listing_outcome.py
