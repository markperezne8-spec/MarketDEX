name: MarketDEX CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: marketdex-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Permanent Codebase Verification
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - name: Install dependencies
        run: python -m pip install pytest -r requirements.txt
      - name: Verify permanent codebase
        run: python -m pytest -q
