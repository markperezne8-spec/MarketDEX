name: Marketplace Listing Preparation Build Status Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_BUILD_STATUS.md'
      - '.github/workflows/marketplace-listing-preparation-build-status-gate.yml'

jobs:
  marketplace-listing-preparation-build-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'IMPLEMENTED FOR PR VALIDATION' docs/MARKETPLACE_LISTING_PREPARATION_BUILD_STATUS.md
      - run: grep -q 'offline marketplace listing package' docs/MARKETPLACE_LISTING_PREPARATION_BUILD_STATUS.md
