name: RC Delivery Next Boundary Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_NEXT_BOUNDARY.md'
      - 'tests/test_rc_delivery_next_boundary_contract.py'
      - '.github/workflows/rc-delivery-next-boundary-gate.yml'

jobs:
  rc-delivery-next-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_next_boundary_contract.py
