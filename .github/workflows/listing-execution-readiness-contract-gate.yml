name: Listing Execution Readiness Contract Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - 'docs/LISTING_EXECUTION_READINESS.md'
      - 'tests/test_listing_execution_readiness_contract.py'
      - '.github/workflows/listing-execution-readiness-contract-gate.yml'

jobs:
  listing-execution-readiness-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest -q tests/test_listing_execution_readiness_contract.py
