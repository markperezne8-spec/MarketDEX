name: Windows RC Delivery Status Gate

on:
  pull_request:
    paths:
      - 'docs/WINDOWS_RC_DELIVERY_STATUS.md'
      - 'tests/test_windows_rc_delivery_status_contract.py'
      - '.github/workflows/windows-rc-delivery-status-gate.yml'

jobs:
  windows-rc-delivery-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_windows_rc_delivery_status_contract.py
