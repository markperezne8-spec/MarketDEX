name: Marketplace Listing Preparation Release Note Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_RELEASE_NOTE.md'
      - '.github/workflows/marketplace-listing-preparation-release-note-gate.yml'

jobs:
  marketplace-listing-preparation-release-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'visible offline marketplace listing package' docs/MARKETPLACE_LISTING_PREPARATION_RELEASE_NOTE.md
      - run: grep -q 'Marketplace publication remains outside the build' docs/MARKETPLACE_LISTING_PREPARATION_RELEASE_NOTE.md
