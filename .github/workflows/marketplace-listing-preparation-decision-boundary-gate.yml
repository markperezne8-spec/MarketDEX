name: Marketplace Listing Preparation Decision Boundary Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_DECISION_BOUNDARY.md'
      - '.github/workflows/marketplace-listing-preparation-decision-boundary-gate.yml'

jobs:
  marketplace-listing-preparation-decision-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: "grep -q 'Gate authority: Listing Execution Readiness' docs/MARKETPLACE_LISTING_PREPARATION_DECISION_BOUNDARY.md"
      - run: "grep -q 'visible offline listing package or PACKAGE BLOCKED status' docs/MARKETPLACE_LISTING_PREPARATION_DECISION_BOUNDARY.md"
      - run: "grep -q 'No remote marketplace state is read or changed' docs/MARKETPLACE_LISTING_PREPARATION_DECISION_BOUNDARY.md"
