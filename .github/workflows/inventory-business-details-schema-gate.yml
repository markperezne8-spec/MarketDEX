name: Inventory Business Details Schema Gate
on: [pull_request, workflow_dispatch]
jobs:
  schema-gate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: pip install pytest -r requirements.txt
      - name: Verify upgrade-safe schema contract
        run: pytest -vv --tb=long tests/test_inventory_business_details_schema.py
