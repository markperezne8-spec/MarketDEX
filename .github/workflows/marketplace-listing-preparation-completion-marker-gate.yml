name: Marketplace Listing Preparation Completion Marker Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_COMPLETION_MARKER.md'
      - '.github/workflows/marketplace-listing-preparation-completion-marker-gate.yml'

jobs:
  marketplace-listing-preparation-completion-marker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'MARKETPLACE LISTING PREPARATION COMPLETE WHEN FOCUSED GATES PASS' docs/MARKETPLACE_LISTING_PREPARATION_COMPLETION_MARKER.md
      - run: grep -q 'pull request head' docs/MARKETPLACE_LISTING_PREPARATION_COMPLETION_MARKER.md
