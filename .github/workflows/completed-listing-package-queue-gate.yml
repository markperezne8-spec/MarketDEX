name: Completed Listing Package Queue Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - 'core/listing_package_review_repository.py'
      - 'ui/inventory_completed_listing_package_queue_feature.py'
      - 'tests/test_completed_listing_package_queue.py'
      - 'tests/test_completed_listing_package_queue_contract.py'
      - 'docs/COMPLETED_LISTING_PACKAGE_QUEUE.md'
      - 'docs/BUILD_PROGRESS.md'
      - '.github/workflows/completed-listing-package-queue-gate.yml'

jobs:
  completed-listing-package-queue:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_completed_listing_package_queue.py tests/test_completed_listing_package_queue_contract.py tests/test_listing_package_review_persistence.py tests/test_inventory_marketplace_listing_package_review_ui.py
