name: Operator Shell Refresh Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_refresh_contract.py'
      - '.github/workflows/operator-shell-refresh-gate.yml'

jobs:
  operator-shell-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_shell_refresh_contract.py
