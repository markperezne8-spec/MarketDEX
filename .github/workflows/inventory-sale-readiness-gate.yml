name: Inventory Sale Readiness Gate
on: [pull_request, workflow_dispatch]
jobs:
  inventory-sale-readiness:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - name: Install dependencies
        run: pip install pytest -r requirements.txt
      - name: Verify sale readiness decisions
        run: pytest -q tests/test_inventory_sale_readiness_feature.py tests/test_inventory_cost_intake_feature.py tests/test_inventory_detail_visibility_ui.py tests/test_add_asset_business_details_ui.py
