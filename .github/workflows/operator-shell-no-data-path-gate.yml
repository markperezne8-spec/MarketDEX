name: Operator Shell No New Data Path Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_no_new_data_path.py'
      - '.github/workflows/operator-shell-no-data-path-gate.yml'

jobs:
  no-new-data-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify shell has no independent IO path
        run: python -m pytest -q tests/test_operator_shell_no_new_data_path.py
