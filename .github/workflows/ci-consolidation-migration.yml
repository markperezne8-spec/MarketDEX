name: CI Consolidation Migration

on:
  push:
    branches: [infra-professional-ci-five-gates]

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: infra-professional-ci-five-gates
          fetch-depth: 0
      - name: Remove legacy workflow flood
        shell: bash
        run: |
          find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) ! -name 'ci.yml' ! -name 'ci-consolidation-migration.yml' -print -delete
      - name: Commit consolidated CI surface
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Retire legacy CI workflow flood'
          git push origin HEAD:infra-professional-ci-five-gates
