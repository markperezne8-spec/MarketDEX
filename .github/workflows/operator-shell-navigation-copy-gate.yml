name: Operator Shell Navigation Copy Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_navigation_copy.py'
      - '.github/workflows/operator-shell-navigation-copy-gate.yml'

jobs:
  operator-navigation-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify operator navigation language
        run: python -m pytest -q tests/test_operator_shell_navigation_copy.py
