name: Operator Sales Workspace Scope Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_sales_workspace_contract.py'
      - 'docs/operator_workspace_recomposition.md'
      - 'docs/operator_sales_workspace_test_matrix.md'
      - 'docs/operator_sales_workspace_scope.md'
      - '.github/workflows/operator-sales-workspace-gate.yml'
      - '.github/workflows/operator-sales-workspace-scope-gate.yml'
      - '.github/workflows/operator-sales-workspace-test-matrix-doc-gate.yml'
      - '.github/workflows/operator-sales-workspace-decision-boundary-gate.yml'
  workflow_dispatch:

jobs:
  operator-sales-workspace-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify recomposition scope
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1
          changed="$(git diff --name-only "origin/${{ github.base_ref || 'main' }}...HEAD")"
          echo "$changed"
          forbidden="$(echo "$changed" | grep -Ev '^(ui/viewport_fit_feature.py|tests/test_operator_sales_workspace_contract.py|docs/operator_(workspace_recomposition|sales_workspace_(test_matrix|scope))\.md|\.github/workflows/operator-sales-workspace-(gate|scope-gate|test-matrix-doc-gate|decision-boundary-gate)\.yml)$' || true)"
          test -z "$forbidden" || { echo "Out-of-scope files:"; echo "$forbidden"; exit 1; }
