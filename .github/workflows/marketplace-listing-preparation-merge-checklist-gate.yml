name: Marketplace Listing Preparation Merge Checklist Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_MERGE_CHECKLIST.md'
      - '.github/workflows/marketplace-listing-preparation-merge-checklist-gate.yml'

jobs:
  marketplace-listing-preparation-merge-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'Exact head SHA is captured before merge' docs/MARKETPLACE_LISTING_PREPARATION_MERGE_CHECKLIST.md
      - run: grep -q 'Progress is 88%' docs/MARKETPLACE_LISTING_PREPARATION_MERGE_CHECKLIST.md
      - run: grep -q 'Marketplace Listing Package Review' docs/MARKETPLACE_LISTING_PREPARATION_MERGE_CHECKLIST.md
