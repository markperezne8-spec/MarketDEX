name: Operator Shell PR Summary Gate

on:
  pull_request:
    paths:
      - 'docs/operator_shell_pr_summary.md'
      - 'tests/test_operator_shell_pr_summary.py'
      - '.github/workflows/operator-shell-pr-summary-gate.yml'

jobs:
  operator-shell-pr-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_shell_pr_summary.py
