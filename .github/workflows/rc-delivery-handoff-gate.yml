name: RC Delivery Handoff Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_HANDOFF.md'
      - 'tests/test_rc_delivery_handoff_contract.py'
      - '.github/workflows/rc-delivery-handoff-gate.yml'

jobs:
  rc-delivery-handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_handoff_contract.py
