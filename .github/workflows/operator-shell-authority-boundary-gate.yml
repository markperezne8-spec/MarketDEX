name: Operator Shell Authority Boundary Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_no_authority_duplication.py'
      - '.github/workflows/operator-shell-authority-boundary-gate.yml'

jobs:
  operator-shell-authority-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify shell does not duplicate business authority
        run: python -m pytest -q tests/test_operator_shell_no_authority_duplication.py
