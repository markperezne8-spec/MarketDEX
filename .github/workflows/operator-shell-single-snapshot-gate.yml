name: Operator Shell Single Snapshot Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_dashboard_no_duplicate_snapshot.py'
      - '.github/workflows/operator-shell-single-snapshot-gate.yml'

jobs:
  single-snapshot-presentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify snapshot cards are moved not cloned
        run: python -m pytest -q tests/test_operator_shell_dashboard_no_duplicate_snapshot.py
