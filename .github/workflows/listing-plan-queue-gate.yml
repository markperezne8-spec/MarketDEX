name: Listing Plan Queue Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - 'ui/inventory_listing_plan_queue_feature.py'
      - 'tests/test_inventory_listing_plan_queue_ui.py'
      - '.github/workflows/listing-plan-queue-gate.yml'

jobs:
  listing-plan-queue:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_inventory_listing_plan_queue_ui.py
