name: Marketplace Listing Preparation Marketplace Policy Gate

on:
  pull_request:
    paths:
      - 'ui/inventory_marketplace_listing_preparation_feature.py'
      - 'docs/MARKETPLACE_LISTING_PREPARATION_MARKETPLACE_POLICY.md'
      - 'tests/test_marketplace_listing_preparation_marketplace_policy.py'
      - '.github/workflows/marketplace-listing-preparation-marketplace-policy-gate.yml'

jobs:
  marketplace-listing-preparation-marketplace-policy:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_marketplace_listing_preparation_marketplace_policy.py
