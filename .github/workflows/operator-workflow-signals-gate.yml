name: Operator Workflow Signals Gate

on:
  pull_request:
    paths:
      - 'docs/OPERATOR_WORKFLOW_SIGNALS.md'
      - 'tests/test_operator_workflow_signals_contract.py'
      - '.github/workflows/operator-workflow-signals-gate.yml'

jobs:
  operator-workflow-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_workflow_signals_contract.py
