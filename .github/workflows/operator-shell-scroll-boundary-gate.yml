name: Operator Shell Scroll Boundary Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_scroll_boundaries.py'
      - '.github/workflows/operator-shell-scroll-boundary-gate.yml'

jobs:
  workspace-scroll-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify independent workspace scrolling
        run: python -m pytest -q tests/test_operator_shell_scroll_boundaries.py
