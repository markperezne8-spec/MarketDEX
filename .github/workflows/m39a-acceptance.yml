name: M39A Acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  authority-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - name: Run full authority conformance suite
        run: |
          pytest -q > pytest.log 2>&1 || {
            tail -n 120 pytest.log
            exit 1
          }
          cat pytest.log
