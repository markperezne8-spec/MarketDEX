name: Marketplace Listing Preparation No Remote Side Effects Gate

on:
  pull_request:
    paths:
      - 'ui/inventory_marketplace_listing_preparation_feature.py'
      - 'docs/MARKETPLACE_LISTING_PREPARATION_NO_REMOTE_SIDE_EFFECTS.md'
      - 'tests/test_marketplace_listing_preparation_no_remote_side_effects.py'
      - '.github/workflows/marketplace-listing-preparation-no-remote-side-effects-gate.yml'

jobs:
  marketplace-listing-preparation-no-remote-side-effects:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest -q tests/test_marketplace_listing_preparation_no_remote_side_effects.py
