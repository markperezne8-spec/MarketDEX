name: Marketplace Listing Preparation Summary Contract Gate

on:
  pull_request:
    paths:
      - 'ui/inventory_marketplace_listing_preparation_feature.py'
      - 'docs/MARKETPLACE_LISTING_PREPARATION_SUMMARY_CONTRACT.md'
      - 'tests/test_marketplace_listing_preparation_summary_contract.py'
      - '.github/workflows/marketplace-listing-preparation-summary-contract-gate.yml'

jobs:
  marketplace-listing-preparation-summary-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest -q tests/test_marketplace_listing_preparation_summary_contract.py
