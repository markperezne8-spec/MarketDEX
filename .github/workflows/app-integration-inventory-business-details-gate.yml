name: App Integration Inventory Business Details Gate
on: [pull_request, workflow_dispatch]
jobs:
  inventory-business-details-gate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: pip install pytest -r requirements.txt
      - name: Verify Inventory Business Details contract
        run: pytest -vv --tb=long tests/test_inventory_business_details_integration.py
      - name: Verify adjacent Inventory contracts
        run: pytest -q tests/test_inventory_edit_details_integration.py tests/test_inventory_archive_integration.py tests/test_inventory_restore_integration.py tests/test_mission_control_integration.py
