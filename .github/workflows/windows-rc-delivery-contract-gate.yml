name: Windows RC Delivery Contract Gate

on:
  pull_request:
    paths:
      - '.github/workflows/windows-rc-delivery.yml'
      - '.github/workflows/windows-rc-delivery-contract-gate.yml'
      - 'docs/WINDOWS_RC_OPERATOR_DELIVERY.md'
      - 'docs/WINDOWS_RC_DELIVERY_CHECKLIST.md'
      - 'tests/test_windows_rc_delivery_contract.py'
      - 'tests/test_windows_rc_delivery_checklist_contract.py'

jobs:
  windows-rc-delivery-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_windows_rc_delivery_contract.py tests/test_windows_rc_delivery_checklist_contract.py
