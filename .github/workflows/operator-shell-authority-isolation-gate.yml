name: Operator Shell Authority Isolation Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_no_authority_imports.py'
      - '.github/workflows/operator-shell-authority-isolation-gate.yml'

jobs:
  operator-shell-authority-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_shell_no_authority_imports.py
