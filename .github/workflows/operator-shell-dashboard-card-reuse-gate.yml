name: Operator Shell Dashboard Card Reuse Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_dashboard_card_reuse.py'
      - '.github/workflows/operator-shell-dashboard-card-reuse-gate.yml'

jobs:
  dashboard-card-reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify live snapshot card reuse
        run: python -m pytest -q tests/test_operator_shell_dashboard_card_reuse.py
