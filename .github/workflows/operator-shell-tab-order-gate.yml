name: Operator Shell Tab Order Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_tab_order.py'
      - '.github/workflows/operator-shell-tab-order-gate.yml'

jobs:
  operator-shell-tab-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_shell_tab_order.py
