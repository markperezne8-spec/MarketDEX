name: CI Cleanup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install professional CI surface
        shell: bash
        run: |
          cat > .github/workflows/ci.yml <<'YAML'
          name: MarketDEX CI

          on:
            pull_request:
            push:
              branches: [main]

          concurrency:
            group: marketdex-ci-${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

          permissions:
            contents: read

          jobs:
            core-tests:
              name: Core Tests
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                    cache: pip
                - run: pip install -r requirements.txt
                - run: pytest -q tests --ignore=tests/test_viewport_fit_feature.py -k 'database or service or schema or mission_control'

            inventory:
              name: Inventory
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                    cache: pip
                - run: pip install -r requirements.txt
                - run: pytest -q tests -k 'inventory and not pricing and not listing and not viewport'

            pricing:
              name: Pricing
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                    cache: pip
                - run: pip install -r requirements.txt
                - run: pytest -q tests -k 'pricing or profit or sale_readiness or price_guidance'

            listing:
              name: Listing
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                    cache: pip
                - run: pip install -r requirements.txt
                - run: pytest -q tests -k 'listing or sale_completion'

            desktop-build:
              name: Desktop Build
              runs-on: windows-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                    cache: pip
                - run: pip install -r requirements.txt
                - run: pytest -q tests/test_viewport_fit_feature.py
                - run: python -m py_compile launcher.py
          YAML
          find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) ! -name 'ci.yml' ! -name 'ci-cleanup.yml' -delete
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows
          git commit -m 'Consolidate CI into five professional gates'
          git push origin HEAD:main
