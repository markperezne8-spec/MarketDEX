name: Marketplace Listing Preparation Final Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_FINAL_GATE.md'
      - '.github/workflows/marketplace-listing-preparation-final-gate.yml'

jobs:
  marketplace-listing-preparation-final:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'exact pull-request head' docs/MARKETPLACE_LISTING_PREPARATION_FINAL_GATE.md
      - run: grep -q 'Marketplace Listing Package Review branch may begin' docs/MARKETPLACE_LISTING_PREPARATION_FINAL_GATE.md
