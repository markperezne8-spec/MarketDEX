name: Operator Shell Recomposition Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_recomposition.py'
      - '.github/workflows/operator-shell-recomposition-gate.yml'

jobs:
  operator-shell-recomposition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q tests/test_operator_shell_recomposition.py
