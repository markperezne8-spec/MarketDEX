name: Marketplace Listing Preparation Visibility Gate

on:
  pull_request:
    paths:
      - 'ui/inventory_marketplace_listing_preparation_feature.py'
      - 'docs/MARKETPLACE_LISTING_PREPARATION_VISIBILITY.md'
      - '.github/workflows/marketplace-listing-preparation-visibility-gate.yml'

jobs:
  marketplace-listing-preparation-visibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'MARKETPLACE LISTING PREPARATION' ui/inventory_marketplace_listing_preparation_feature.py
      - run: grep -q 'LISTING PACKAGE READY' ui/inventory_marketplace_listing_preparation_feature.py
      - run: grep -q 'PACKAGE BLOCKED' ui/inventory_marketplace_listing_preparation_feature.py
      - run: grep -q 'Inventory operator panel' docs/MARKETPLACE_LISTING_PREPARATION_VISIBILITY.md
