name: RC Delivery CI Note Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_CI_NOTE.md'
      - 'tests/test_rc_delivery_ci_note_contract.py'
      - '.github/workflows/rc-delivery-ci-note-gate.yml'

jobs:
  rc-delivery-ci-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_ci_note_contract.py
