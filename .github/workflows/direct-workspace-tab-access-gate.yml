name: Direct Workspace Tab Access Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_viewport_fit_feature.py'
      - 'docs/direct_workspace_tab_access_fix.md'

permissions:
  contents: read

jobs:
  direct-workspace-tab-access:
    name: Direct Workspace Tab Access
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q tests/test_viewport_fit_feature.py
