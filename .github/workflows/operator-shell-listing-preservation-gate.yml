name: Operator Shell Listing Preservation Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_listing_widget_preservation.py'
      - '.github/workflows/operator-shell-listing-preservation-gate.yml'

jobs:
  operator-shell-listing-preservation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_shell_listing_widget_preservation.py
