name: Persisted Listing Review Progress Gate

on:
  pull_request:
    paths:
      - 'docs/BUILD_PROGRESS.md'
      - 'docs/PERSISTED_LISTING_REVIEW_PROGRESS_CONTRACT.md'
      - 'tests/test_persisted_listing_review_progress_contract.py'
      - '.github/workflows/persisted-listing-review-progress-gate.yml'

jobs:
  persisted-listing-review-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest -q tests/test_persisted_listing_review_progress_contract.py
