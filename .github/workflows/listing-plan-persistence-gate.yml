name: Listing Plan Persistence Gate

on:
  pull_request:
    paths:
      - 'core/schema.py'
      - 'core/listing_plan_repository.py'
      - 'ui/inventory_listing_workspace_feature.py'
      - 'tests/test_listing_plan_repository.py'
      - 'tests/test_inventory_listing_plan_ui.py'
      - '.github/workflows/listing-plan-persistence-gate.yml'

jobs:
  listing-plan-persistence:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_listing_plan_repository.py tests/test_inventory_listing_plan_ui.py
