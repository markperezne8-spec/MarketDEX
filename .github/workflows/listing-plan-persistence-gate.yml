name: Listing Plan Persistence Gate

on:
  pull_request:
    paths:
      - 'core/schema.py'
      - 'core/listing_plan_repository.py'
      - 'tests/test_listing_plan_repository.py'
      - '.github/workflows/listing-plan-persistence-gate.yml'

jobs:
  listing-plan-persistence:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest -q tests/test_listing_plan_repository.py
