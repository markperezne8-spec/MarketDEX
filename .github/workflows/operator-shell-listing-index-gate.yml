name: Operator Shell Listing Index Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_listing_index.py'
      - '.github/workflows/operator-shell-listing-index-gate.yml'

jobs:
  dynamic-listing-handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify dynamic Listings handoff
        run: python -m pytest -q tests/test_operator_shell_listing_index.py
