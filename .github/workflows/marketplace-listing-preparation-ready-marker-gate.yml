name: Marketplace Listing Preparation Ready Marker Gate

on:
  pull_request:
    paths:
      - 'ui/inventory_marketplace_listing_preparation_feature.py'
      - 'docs/MARKETPLACE_LISTING_PREPARATION_READY_MARKER.md'
      - '.github/workflows/marketplace-listing-preparation-ready-marker-gate.yml'

jobs:
  marketplace-listing-preparation-ready-marker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for marker in "LISTING PACKAGE READY" "OFFLINE PREPARATION ONLY" "PACKAGE BLOCKED"; do
            grep -q "$marker" ui/inventory_marketplace_listing_preparation_feature.py
            grep -q "$marker" docs/MARKETPLACE_LISTING_PREPARATION_READY_MARKER.md
          done
