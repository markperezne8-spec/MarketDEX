name: Operator Shell Feature Scope Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_feature_scope.py'
      - '.github/workflows/operator-shell-feature-scope-gate.yml'

jobs:
  operator-shell-feature-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify presentation feature scope
        run: python -m pytest -q tests/test_operator_shell_feature_scope.py
