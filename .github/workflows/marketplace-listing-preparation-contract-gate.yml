name: Marketplace Listing Preparation Contract Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - 'docs/MARKETPLACE_LISTING_PREPARATION.md'
      - 'tests/test_marketplace_listing_preparation_contract.py'
      - '.github/workflows/marketplace-listing-preparation-contract-gate.yml'

jobs:
  marketplace-listing-preparation-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest -q tests/test_marketplace_listing_preparation_contract.py
