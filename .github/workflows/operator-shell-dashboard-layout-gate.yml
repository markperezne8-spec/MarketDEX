name: Operator Shell Dashboard Layout Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_dashboard_layout.py'
      - '.github/workflows/operator-shell-dashboard-layout-gate.yml'

jobs:
  dashboard-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify Mission Control dashboard spacing
        run: python -m pytest -q tests/test_operator_shell_dashboard_layout.py
