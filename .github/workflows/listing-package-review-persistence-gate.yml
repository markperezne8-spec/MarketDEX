name: Listing Package Review Persistence Gate

on:
  pull_request:
    paths:
      - 'core/schema.py'
      - 'core/listing_package_review_repository.py'
      - 'ui/inventory_marketplace_listing_package_review_feature.py'
      - 'tests/test_listing_package_review_persistence.py'
      - '.github/workflows/listing-package-review-persistence-gate.yml'

jobs:
  listing-package-review-persistence:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_listing_package_review_persistence.py tests/test_inventory_marketplace_listing_package_review_ui.py
