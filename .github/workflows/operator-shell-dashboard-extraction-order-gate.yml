name: Operator Shell Dashboard Extraction Order Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_inventory_title_removed.py'
      - '.github/workflows/operator-shell-dashboard-extraction-order-gate.yml'

jobs:
  dashboard-extraction-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify dashboard extraction order
        run: python -m pytest -q tests/test_operator_shell_inventory_title_removed.py
