name: Operator Shell Refresh Preservation Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_refresh_preservation.py'
      - '.github/workflows/operator-shell-refresh-preservation-gate.yml'

jobs:
  refresh-ownership-preservation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify existing refresh ownership
        run: python -m pytest -q tests/test_operator_shell_refresh_preservation.py
