name: Operator Shell Dashboard Live Values Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_dashboard_live_values.py'
      - '.github/workflows/operator-shell-dashboard-live-values-gate.yml'

jobs:
  dashboard-live-values:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify live Mission Control value reuse
        run: python -m pytest -q tests/test_operator_shell_dashboard_live_values.py
