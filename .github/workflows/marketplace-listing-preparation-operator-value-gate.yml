name: Marketplace Listing Preparation Operator Value Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_OPERATOR_VALUE.md'
      - '.github/workflows/marketplace-listing-preparation-operator-value-gate.yml'

jobs:
  marketplace-listing-preparation-operator-value:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'first listing-ready field set' docs/MARKETPLACE_LISTING_PREPARATION_OPERATOR_VALUE.md
      - run: grep -q 'reduces preparation ambiguity without introducing remote marketplace automation' docs/MARKETPLACE_LISTING_PREPARATION_OPERATOR_VALUE.md
