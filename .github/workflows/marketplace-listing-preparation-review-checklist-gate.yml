name: Marketplace Listing Preparation Review Checklist Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_REVIEW_CHECKLIST.md'
      - '.github/workflows/marketplace-listing-preparation-review-checklist-gate.yml'

jobs:
  marketplace-listing-preparation-review-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'Execution readiness must pass' docs/MARKETPLACE_LISTING_PREPARATION_REVIEW_CHECKLIST.md
      - run: grep -q 'Asset ID must remain visible' docs/MARKETPLACE_LISTING_PREPARATION_REVIEW_CHECKLIST.md
      - run: grep -q 'Marketplace publication remains outside this build' docs/MARKETPLACE_LISTING_PREPARATION_REVIEW_CHECKLIST.md
