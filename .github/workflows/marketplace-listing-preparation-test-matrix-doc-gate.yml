name: Marketplace Listing Preparation Test Matrix Doc Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_TEST_MATRIX.md'
      - '.github/workflows/marketplace-listing-preparation-test-matrix-doc-gate.yml'

jobs:
  marketplace-listing-preparation-test-matrix-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: "grep -q 'PASS: active quantity' docs/MARKETPLACE_LISTING_PREPARATION_TEST_MATRIX.md"
      - run: "grep -q 'BLOCK: zero quantity' docs/MARKETPLACE_LISTING_PREPARATION_TEST_MATRIX.md"
      - run: "grep -q 'BLOCK: sale-readiness failure' docs/MARKETPLACE_LISTING_PREPARATION_TEST_MATRIX.md"
