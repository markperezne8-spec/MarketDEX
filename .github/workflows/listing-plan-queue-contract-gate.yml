name: Listing Plan Queue Contract Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - 'docs/LISTING_PLAN_QUEUE.md'
      - 'tests/test_listing_plan_queue_contract.py'
      - '.github/workflows/listing-plan-queue-contract-gate.yml'

jobs:
  listing-plan-queue-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest -q tests/test_listing_plan_queue_contract.py
