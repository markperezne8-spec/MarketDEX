name: Marketplace Listing Preparation Build Authority Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_BUILD_AUTHORITY.md'
      - '.github/workflows/marketplace-listing-preparation-build-authority-gate.yml'

jobs:
  marketplace-listing-preparation-build-authority:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'offline package preparation after a passing Listing Execution Readiness result' docs/MARKETPLACE_LISTING_PREPARATION_BUILD_AUTHORITY.md
      - run: grep -q 'no marketplace publication authority' docs/MARKETPLACE_LISTING_PREPARATION_BUILD_AUTHORITY.md
