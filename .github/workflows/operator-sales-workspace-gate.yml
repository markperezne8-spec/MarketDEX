name: Operator Sales Workspace Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_sales_workspace_contract.py'
      - 'docs/operator_workspace_recomposition.md'
      - '.github/workflows/operator-sales-workspace-gate.yml'
  workflow_dispatch:

jobs:
  operator-sales-workspace-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest -q tests/test_operator_sales_workspace_contract.py
