name: Operator Shell Scope Gate

on:
  pull_request:
    paths:
      - 'docs/operator_shell_recomposition.md'
      - 'tests/test_operator_shell_recomposition_doc.py'
      - '.github/workflows/operator-shell-scope-gate.yml'

jobs:
  operator-shell-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_shell_recomposition_doc.py
