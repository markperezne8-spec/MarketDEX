name: Marketplace Listing Preparation Change Summary Gate

on:
  pull_request:
    paths:
      - 'docs/MARKETPLACE_LISTING_PREPARATION_CHANGE_SUMMARY.md'
      - '.github/workflows/marketplace-listing-preparation-change-summary-gate.yml'

jobs:
  marketplace-listing-preparation-change-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'after Listing Execution Readiness' docs/MARKETPLACE_LISTING_PREPARATION_CHANGE_SUMMARY.md
      - run: grep -q 'persisted listing plan only when readiness passes' docs/MARKETPLACE_LISTING_PREPARATION_CHANGE_SUMMARY.md
      - run: grep -q 'no remote marketplace side effects' docs/MARKETPLACE_LISTING_PREPARATION_CHANGE_SUMMARY.md
