name: MarketDEX CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: marketdex-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  core-tests:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short --junitxml=core-results.xml tests/test_runtime_database_authority.py tests/test_cap005a_product_registry_authority.py tests/test_cap005b_inventory_product_link_authority.py tests/test_cap005c_product_registry_lookup.py tests/test_cap008a_settlement_evidence_parent.py tests/test_cap008b_settlement_evidence_linkage.py tests/test_cap008d_settlement_verification_authority.py tests/test_cap008e_linkage_contradiction_guidance.py tests/test_cap009a_settlement_allocation_evidence.py tests/test_cap009b_allocation_group_cross_check.py tests/test_cap009c_sale_settlement_attribution_readiness.py tests/test_cap009d_allocation_group_lifecycle.py tests/test_build504_stale_cross_check_authority.py tests/test_build504_stale_cross_check_lock_authority.py tests/test_cap010a_allocation_revision_supersession.py tests/test_cap011a_allocation_evidence_lock.py tests/test_m39a_standalone_settlement.py
      - name: Upload core test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: core-results.xml

  collection:
    name: Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - name: Run Collection gate
        run: >-
          pytest -q --tb=short --junitxml=collection-results.xml
          tests/test_cap006_collection_position_slice.py
          tests/test_cap006_collection_position_workspace.py
          tests/test_cap005c_product_registry_navigation.py
      - name: Upload Collection test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-test-results
          path: collection-results.xml
          if-no-files-found: error

  market-intelligence:
    name: Market Intelligence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - name: Run Market Intelligence gate
        run: >-
          pytest -q --tb=short --junitxml=market-intelligence-results.xml
          tests/test_market_intelligence_foundation.py
          tests/test_build700b_market_observation_gateway.py
          tests/test_build700c_market_attention_signals.py
          tests/test_build700d_market_intelligence_workspace.py
      - name: Upload Market Intelligence test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-intelligence-test-results
          path: market-intelligence-results.xml
          if-no-files-found: error

  reports:
    name: Reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - name: Run Reports gate
        run: >-
          pytest -q --tb=short --junitxml=reports-results.xml
          tests/test_build701c_reports_definition_catalog.py
          tests/test_build701d_inventory_age_report_fixture.py
          tests/test_build701e_inventory_age_projection_boundary_doc.py
          tests/test_build701f_inventory_age_row_derivation.py
          tests/test_build701g_inventory_age_source_date_authority_doc.py
          tests/test_build701h_inventory_age_source_adapter.py
      - name: Upload Reports test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-test-results
          path: reports-results.xml
          if-no-files-found: error

  inventory:
    name: Inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short tests/test_inventory_app_integration.py tests/test_inventory_metadata_defaults.py tests/test_inventory_sort_integration.py

  pricing:
    name: Pricing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short tests/test_inventory_profit_feature.py tests/test_inventory_price_guidance_feature.py tests/test_inventory_business_scenarios.py

  listing:
    name: Listing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - name: Run Listing gate
        run: pytest -q --tb=short --junitxml=listing-results.xml tests/test_listing_plan_repository.py tests/test_operator_sale_completion.py tests/test_listing_workspace_ci_note.py
      - name: Upload Listing test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: listing-test-results
          path: listing-results.xml
          if-no-files-found: error

  mission-control-visual-slice:
    name: Mission Control Visual Slice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - name: Validate Mission Control design-system migration
        run: >-
          pytest -q --tb=short
          tests/test_mission_control_design_system_migration.py
          tests/test_design_system_foundation.py
          tests/test_qt_design_system_primitives.py
      - name: Compile Mission Control presentation layer
        run: python -m py_compile ui/main_window.py ui/design_system/tokens.py ui/design_system/qt_theme.py ui/design_system/widgets.py

  desktop-build:
    name: Desktop Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -q -r requirements-build.txt pytest
      - name: Run Desktop contract gate
        run: pytest -q --tb=short --junitxml=desktop-results.xml tests/test_architecture_governance_contract.py tests/test_market_intelligence_foundation.py tests/test_application_composition.py tests/test_feature_catalog.py tests/test_workspace_navigation_contract.py tests/test_workspace_host.py tests/test_shell_workspace_catalog.py tests/test_cap005c_product_registry_workspace.py tests/test_cap005c_product_registry_navigation.py tests/test_maximized_desktop_launch_contract.py tests/test_packaged_launcher_contract.py tests/test_application_shell_contract.py tests/test_installer_contract.py tests/test_wheel_safe_value_controls.py tests/test_shell_workspace_foundation.py
      - name: Upload Desktop test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-results
          path: desktop-results.xml
          if-no-files-found: error
      - run: python -m py_compile launcher.py composition/application_composition.py composition/feature_catalog.py
      - run: python -m compileall -q market_intelligence
      - run: pyinstaller --noconfirm --clean MarketDEX.spec
      - name: Verify packaged runtime
        shell: pwsh
        run: |
          $env:MARKETDEX_DATA_DIR = Join-Path $env:RUNNER_TEMP "marketdex-data"
          $process = Start-Process -FilePath ".\dist\MarketDEX.exe" -ArgumentList "--verify-runtime" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Packaged MarketDEX runtime verification failed with exit code $($process.ExitCode)." }
          if (!(Test-Path "$env:MARKETDEX_DATA_DIR\marketdex.sqlite3")) { throw "Packaged runtime database was not created." }
      - name: Upload MarketDEX Windows build
        uses: actions/upload-artifact@v4
        with:
          name: MarketDEX-Windows
          path: dist/MarketDEX.exe
          if-no-files-found: error
      - name: Install Inno Setup compiler
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Build MarketDEX installer
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $compiler)) { $compiler = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          if (!(Test-Path $compiler)) { throw "Inno Setup compiler was not found." }
          & $compiler ".\installer\MarketDEX.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compiler failed with exit code $LASTEXITCODE." }
          if (!(Test-Path ".\dist\MarketDEX_Setup.exe")) { throw "MarketDEX_Setup.exe was not created." }
      - name: Verify installed MarketDEX runtime
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "marketdex-installed"
          $installArgs = @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-', "/DIR=$installDir")
          $install = Start-Process -FilePath ".\dist\MarketDEX_Setup.exe" -ArgumentList $installArgs -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "MarketDEX installer failed with exit code $($install.ExitCode)." }
          if (!(Test-Path "$installDir\MarketDEX.exe")) { throw "Installed MarketDEX.exe was not found." }
          $env:MARKETDEX_DATA_DIR = Join-Path $env:RUNNER_TEMP "marketdex-installer-data"
          $verify = Start-Process -FilePath "$installDir\MarketDEX.exe" -ArgumentList "--verify-runtime" -Wait -PassThru
          if ($verify.ExitCode -ne 0) { throw "Installed MarketDEX runtime verification failed with exit code $($verify.ExitCode)." }
          if (!(Test-Path "$env:MARKETDEX_DATA_DIR\marketdex.sqlite3")) { throw "Installed runtime database was not created." }
      - name: Upload MarketDEX installer
        uses: actions/upload-artifact@v4
        with:
          name: MarketDEX-Installer
          path: dist/MarketDEX_Setup.exe
          if-no-files-found: error
