name: MarketDEX CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: marketdex-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  core-tests:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short tests/test_runtime_database_authority.py

  inventory:
    name: Inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short tests/test_inventory_app_integration.py tests/test_inventory_metadata_defaults.py tests/test_inventory_sort_integration.py

  pricing:
    name: Pricing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short tests/test_inventory_profit_feature.py tests/test_inventory_price_guidance_feature.py

  listing:
    name: Listing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short tests/test_listing_plan_repository.py tests/test_operator_sale_completion.py tests/test_listing_workspace_ci_note.py

  desktop-build:
    name: Desktop Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -q -r requirements.txt pytest
      - run: pytest -q --tb=short tests/test_workspace_navigation_contract.py tests/test_maximized_desktop_launch_contract.py
      - run: python -m py_compile launcher.py
