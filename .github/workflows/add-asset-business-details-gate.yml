name: Add Asset Business Details Gate
on: [pull_request, workflow_dispatch]
jobs:
  add-asset-business-details:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - name: Install dependencies
        run: pip install pytest -r requirements.txt
      - name: Verify Add Asset business detail fields
        run: pytest -vv --tb=long tests/test_add_asset_business_details_ui.py
      - name: Verify business details authority
        run: pytest -q tests/test_inventory_business_details_integration.py tests/test_inventory_business_details_schema.py tests/test_inventory_edit_details_integration.py
