name: RC Delivery Review Checklist Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_REVIEW_CHECKLIST.md'
      - 'tests/test_rc_delivery_review_checklist_contract.py'
      - '.github/workflows/rc-delivery-review-checklist-gate.yml'

jobs:
  rc-delivery-review-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_review_checklist_contract.py
