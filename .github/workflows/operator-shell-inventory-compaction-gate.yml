name: Operator Shell Inventory Compaction Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_inventory_compaction.py'
      - '.github/workflows/operator-shell-inventory-compaction-gate.yml'

jobs:
  inventory-compaction-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify inventory compaction order
        run: python -m pytest -q tests/test_operator_shell_inventory_compaction.py
