name: RC Delivery Build Status Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_BUILD_STATUS.md'
      - 'tests/test_rc_delivery_build_status_contract.py'
      - '.github/workflows/rc-delivery-build-status-gate.yml'

jobs:
  rc-delivery-build-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_build_status_contract.py
