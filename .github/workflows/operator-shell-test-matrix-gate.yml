name: Operator Shell Test Matrix Gate

on:
  pull_request:
    paths:
      - 'docs/operator_shell_test_matrix.md'
      - 'tests/test_operator_shell_test_matrix.py'
      - '.github/workflows/operator-shell-test-matrix-gate.yml'

jobs:
  operator-shell-test-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_operator_shell_test_matrix.py
