name: Operator Shell Dashboard Guidance Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_dashboard_guidance.py'
      - '.github/workflows/operator-shell-dashboard-guidance-gate.yml'

jobs:
  mission-control-guidance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify Mission Control guidance
        run: python -m pytest -q tests/test_operator_shell_dashboard_guidance.py
