name: Runtime Database Authority Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - '.gitignore'
      - 'tests/test_runtime_database_authority.py'
      - 'docs/RUNTIME_DATABASE_AUTHORITY_CONTRACT.md'
      - '.github/workflows/runtime-database-authority-gate.yml'

jobs:
  runtime-database-authority:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_runtime_database_authority.py tests/test_viewport_fit_feature.py
