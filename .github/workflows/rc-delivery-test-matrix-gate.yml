name: RC Delivery Test Matrix Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_TEST_MATRIX.md'
      - 'tests/test_rc_delivery_test_matrix_contract.py'
      - '.github/workflows/rc-delivery-test-matrix-gate.yml'

jobs:
  rc-delivery-test-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_test_matrix_contract.py
