name: RC Delivery Acceptance Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_ACCEPTANCE.md'
      - 'tests/test_rc_delivery_acceptance_contract.py'
      - '.github/workflows/rc-delivery-acceptance-gate.yml'

jobs:
  rc-delivery-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_acceptance_contract.py
