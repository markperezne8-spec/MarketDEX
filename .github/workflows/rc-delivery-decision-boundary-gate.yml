name: RC Delivery Decision Boundary Gate

on:
  pull_request:
    paths:
      - 'docs/RC_DELIVERY_DECISION_BOUNDARY.md'
      - 'tests/test_rc_delivery_decision_boundary_contract.py'
      - '.github/workflows/rc-delivery-decision-boundary-gate.yml'

jobs:
  rc-delivery-decision-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pytest -q tests/test_rc_delivery_decision_boundary_contract.py
