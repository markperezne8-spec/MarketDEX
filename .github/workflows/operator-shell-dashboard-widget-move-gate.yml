name: Operator Shell Dashboard Widget Move Gate

on:
  pull_request:
    paths:
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_operator_shell_dashboard_widget_move.py'
      - '.github/workflows/operator-shell-dashboard-widget-move-gate.yml'

jobs:
  dashboard-widget-move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Verify original dashboard widgets are moved intact
        run: python -m pytest -q tests/test_operator_shell_dashboard_widget_move.py
