name: Responsive Viewport Repair Gate

on:
  pull_request:
    paths:
      - 'launcher.py'
      - 'ui/main_window.py'
      - 'ui/viewport_fit_feature.py'
      - 'tests/test_responsive_viewport_contract.py'
      - 'tests/test_viewport_fit_feature.py'
      - 'docs/RESPONSIVE_VIEWPORT_REPAIR.md'
      - '.github/workflows/responsive-viewport-repair-gate.yml'

jobs:
  responsive-viewport-repair:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install pytest -r requirements.txt
      - run: python -m pytest -q tests/test_responsive_viewport_contract.py tests/test_viewport_fit_feature.py
